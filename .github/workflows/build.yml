name: Build Check (Pull Request)
on:
  pull_request: { branches: [ "main" ] }
  push: { branches: [ "main" ] }
jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          accept-android-sdk-licenses: true
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.7', cache-read-only: false }
      - name: Lint Debug
        run: gradle lintDebug --stacktrace
      - name: Run Unit Tests
        run: gradle testDebugUnitTest --stacktrace
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with: { name: Zenith-TV-Debug-APK, path: app/build/outputs/apk/debug/*.apk, retention-days: 7 }
      - name: Build Debug AAB
        run: gradle bundleDebug --stacktrace
      - name: Upload Debug AAB
        uses: actions/upload-artifact@v4
        with: { name: Zenith-TV-Debug-AAB, path: app/build/outputs/bundle/debug/*.aab, retention-days: 7 }
