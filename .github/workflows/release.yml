name: Release Signed APK + AAB
on:
  push: { tags: [ 'v*.*.*' ] }
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - uses: android-actions/setup-android@v4
        with:
          cmdline-tools-version: 11076708
          accept-android-sdk-licenses: true
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.7', cache-read-only: false }
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/zenith_release.jks
      - name: Build Release AAB
        run: gradle bundleRelease --stacktrace -Pandroid.injected.signing.store.file=/tmp/zenith_release.jks -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      - name: Build Release APK
        run: gradle assembleRelease --stacktrace -Pandroid.injected.signing.store.file=/tmp/zenith_release.jks -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
