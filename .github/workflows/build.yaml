name: Android TV Build (Zenith)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-tv-apk:
    name: Build Native TV Media App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          # Автоматическое кэширование Gradle для ускорения следующих сборок
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12266719
          packages: tools platform-tools
          accept-android-sdk-licenses: true 

      - name: Force accept all Android SDK licenses
        # Тот самый фикс, чтобы сборка не зависала на ожидании ввода "y"
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Cache native build files and ExoPlayer/QuickJS dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (Clean Architecture)
        # Собираем дебаг-версию (для релиза нужно добавить этап подписи APK)
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload TV APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zenith-TV-App-Debug
          # Путь к собранному APK. Убедитесь, что ваш модуль называется 'app'
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7