name: Android Build CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch: # Позволяет запускать сборку вручную из интерфейса GitHub

jobs:
  build:
    name: Build & Test Application
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout project sources
        uses: actions/checkout@v4

      # 2. Настраиваем Java (рекомендуется JDK 17 или 21 для современных Gradle/Compose проектов)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Быстрый и стабильный дистрибутив
          java-version: '17'
          cache: 'gradle' # Встроенное кэширование зависимостей Gradle

      # 3. Настраиваем Android SDK и принудительно принимаем ВСЕ лицензии
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-licenses: false # Не спамим в логи принятыми лицензиями

      # 4. Дополнительный шаг-страховка для автоматического принятия всех лицензий через yes
      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      # 5. Делаем Gradle-скрипт исполняемым (важно, если проект коммитился из-под Windows)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Запускаем линтер и тесты (опционально, можно закомментировать при необходимости)
      - name: Run Linter and Unit Tests
        run: ./gradlew testReleaseUnitTest --continue

      # 7. Собираем релизный APK (или bundle, если нужно: ./gradlew bundleRelease)
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # 8. Сохраняем готовый артефакт (APK) на GitHub, чтобы его можно было скачать
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7 # Хранить файл 7 дней (экономит место в репозитории)