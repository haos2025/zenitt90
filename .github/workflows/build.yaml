name: Build Check (Pull Request)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure local.properties is not committed
        run: |
          if git ls-files --error-unmatch local.properties 2>/dev/null;
          then
            echo "::error::local.properties не должен быть закоммичен"
            exit 1
          fi
          echo "OK"

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint Debug
        run: ./gradlew lintDebug --stacktrace

      - name: Ktlint Check
        run: ./gradlew ktlintCheck --stacktrace

      - name: Detekt
        run: ./gradlew detekt --stacktrace

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Zenith-TV-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Build Debug AAB
        run: ./gradlew bundleDebug --stacktrace

      - name: Upload Debug AAB
        uses: actions/upload-artifact@v4
        with:
          name: Zenith-TV-Debug-AAB
          path: app/build/outputs/bundle/debug/*.aab
          retention-days: 7

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Lint-Report
          path: app/build/reports/lint-results-debug.html
          retention-days: 14