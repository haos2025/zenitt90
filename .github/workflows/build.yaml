name: Android CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Автоматическое принятие лицензий для исправления ошибки 6 of 7 SDK package licenses not accepted
          accept-android-sdk-licenses: true
          # Указание компонентов SDK, необходимых для Media3, Compose и работы проекта
          packages: >
            platforms;android-34
            build-tools;34.0.0
            platform-tools
            extras;google;m2repository
            extras;android;m2repository

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # Сборка проекта для отладочной версии[cite: 6]
        run: ./gradlew assembleDebug